# Briefing inicial - Tennta Marketing

## Objetivo do projeto

Criar uma presenca digital clara para apresentar a Tennta Marketing, seus
servicos e caminhos de contato.

## Publico-alvo

- Empresas locais que precisam organizar sua comunicacao digital.
- Profissionais e marcas que querem captar clientes com mais previsibilidade.
- Negocios que precisam melhorar redes sociais, campanhas e posicionamento.

## Promessa central

Marketing com estrategia, consistencia e acompanhamento de performance.

## Tom de voz

Claro, confiante, proximo e orientado a resultado.

## Conteudos pendentes

- Logo oficial.
- Paleta de cores da marca.
- Servicos finais.
- WhatsApp, email e links sociais.
- Estudos de caso ou depoimentos.
